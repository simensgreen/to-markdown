# Jekyll Configuration
# This file is used by GitHub Pages to generate the documentation site

# Site settings
title: "@cognipeer/to-markdown"
description: "A versatile utility library for converting various file formats to Markdown"
baseurl: "/to-markdown" # the subpath of your site, e.g. /blog
url: "https://cognipeer.github.io" # the base hostname & protocol for your site

# Repository
repository: Cognipeer/to-markdown
github_username: Cognipeer

# Theme settings
theme: just-the-docs
color_scheme: light

# Just the Docs theme configuration
logo: ""
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation footer
footer_content: 'Copyright &copy; 2023-2025 <a href="https://github.com/Cognipeer">Cognipeer</a>. Distributed under the <a href="https://github.com/Cognipeer/to-markdown/blob/main/LICENSE">MIT License</a>.'

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# External navigation links
aux_links:
  "View on GitHub":
    - "https://github.com/Cognipeer/to-markdown"
  "npm Package":
    - "https://www.npmjs.com/package/@cognipeer/to-markdown"

# Aux links open in new tab
aux_links_new_tab: true

# Heading anchors
heading_anchors: true

# Code copy button
enable_copy_code_button: true

# Google Analytics (uncomment and add your tracking ID if needed)
# ga_tracking: UA-NNNNNNNN-N
# ga_tracking_anonymize_ip: true

# Build settings
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache

exclude:
  - node_modules/
  - package.json
  - package-lock.json
  - README.md
  - Gemfile
  - Gemfile.lock
  - "*.gem"
  - "*.gemspec"
  - tools/
  - vendor/

# Collections
collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "docs"
    values:
      layout: "default"
